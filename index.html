<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Pelaporan Kurban 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #f4f8f6;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #0b5d3b, #1b8f5a);
    color: white;
    text-align: center;
    padding: 30px 20px;
}

.header h1 {
    margin: 0;
    font-size: 26px;
}

.header p {
    margin-top: 8px;
    font-size: 14px;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 25px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 18px;
}

/* CARD */
.card {
    background: white;
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    text-decoration: none;
    color: #0b5d3b;
    font-weight: 500;
    box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    transition: 0.25s;
    border-left: 5px solid #1b8f5a;
}

.card:hover {
    transform: translateY(-6px);
    background: #e8f5e9;
}

/* ICON */
.icon {
    font-size: 28px;
    display: block;
    margin-bottom: 10px;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    font-size: 13px;
    color: #555;
}
</style>
</head>

<body>

<div class="header">
    <h1>🐄 Portal Pelaporan Kurban 2026</h1>
   

<div class="container">
    <div class="grid">

        <a class="card" href="https://bit.ly/KIE_Kurban2026" target="_blank">
            <span class="icon">📘</span>
            Materi KIE
        </a>

        <a class="card" href="https://reatlis.isikhnas.pertanian.go.id" target="_blank">
            <span class="icon">📋</span>
            Pelaporan Pemotongan
        </a>

        <a class="card" href="https://bit.ly/formcetakbanmas" target="_blank">
            <span class="icon">🧾</span>
            Form Cetak Pelaporan
        </a>

        <a class="card" href="https://ampm.isikhnas.pertanian.go.id/" target="_blank">
            <span class="icon">🌐</span>
            Pelaporan Kurban (AMPM)
        </a>

        <a class="card" href="https://bit.ly/Banmas2026_lokasi" target="_blank">
            <span class="icon">📍</span>
            Banmas Lokasi
        </a>

        <a class="card" href="https://bit.ly/Banmas2026_AMPM" target="_blank">
            <span class="icon">🧪</span>
            Banmas Hasil AMPM
        </a>

        <a class="card" href="https://bit.ly/MateriRapatKoordinasiKurban2026" target="_blank">
            <span class="icon">👥</span>
            Materi Rakor
        </a>

        <a class="card" href="https://bit.ly/PelaporanKurban" target="_blank">
            <span class="icon">📚</span>
            Buku Saku & Video 
        </a>

    </div>
</div>

<div class="footer">
    © 2026 Kementerian Pertanian RI
</div>

</body>
</html>
